<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dieta Tracker</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dieta">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #232736;
    --text: #e8eaf0;
    --muted: #8b90a0;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --orange: #ff9f43;
    --red: #ff6b6b;
    --border: #2b2f3e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 16px; }

  header { text-align: center; padding: 20px 0 8px; }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header h1 span { color: var(--green); }

  .fase-banner {
    background: linear-gradient(135deg, #16352a, #1a1d27);
    border: 1px solid #2e5c44; border-radius: 12px;
    padding: 12px 16px; margin: 14px 0; font-size: 0.85rem;
  }
  .fase-banner.deficit { background: linear-gradient(135deg, #3a2a1a, #1a1d27); border-color: #6b4a2a; }
  .fase-banner b { color: var(--green); }
  .fase-banner.deficit b { color: var(--orange); }
  .fase-banner .meta { color: var(--muted); font-size: 0.78rem; margin-top: 4px; }

  .streak-banner {
    display: flex; justify-content: center; gap: 20px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 10px; margin: 14px 0;
  }
  .streak-item { text-align: center; flex: 1; }
  .streak-item .num { font-size: 1.4rem; font-weight: 800; }
  .streak-item .lbl { font-size: 0.66rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .flame { color: var(--orange); }
  .ok { color: var(--green); }
  .warn { color: var(--red); }

  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding: 8px 0;
    z-index: 100;
  }
  nav button {
    background: none; border: none; color: var(--muted);
    font-size: 0.75rem; cursor: pointer; padding: 6px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  nav button .ico { font-size: 1.2rem; }
  nav button.active { color: var(--green); }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
  }
  h2 { font-size: 1.05rem; margin-bottom: 12px; }

  .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .date-nav button {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 8px 16px; font-size: 1rem; cursor: pointer;
  }
  .date-nav .dt { font-weight: 700; font-size: 0.95rem; text-align: center; }
  .date-nav .dt .sub { display: block; font-weight: 400; font-size: 0.7rem; color: var(--muted); }

  .toggle-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .toggle {
    flex: 1; padding: 14px 6px; border-radius: 12px; text-align: center;
    border: 1px solid var(--border); background: var(--card2);
    color: var(--text); cursor: pointer; font-size: 0.85rem; font-weight: 600;
    user-select: none;
  }
  .toggle .em { font-size: 1.3rem; display: block; margin-bottom: 4px; }
  .toggle.on-green { background: #16352a; border-color: var(--green); color: var(--green); }
  .toggle.on-red { background: #3a1f24; border-color: var(--red); color: var(--red); }
  .toggle.on-orange { background: #3a2a1a; border-color: var(--orange); color: var(--orange); }
  .hint { font-size: 0.72rem; color: var(--muted); margin: 4px 0 12px; }

  .peso-row { display: flex; align-items: center; gap: 10px; }
  .peso-row input {
    width: 110px; padding: 10px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 1.1rem; text-align: center; font-weight: 700;
  }
  .peso-row input:focus { outline: none; border-color: var(--green); }
  .peso-row .unit { color: var(--muted); }
  .peso-row .trend { margin-left: auto; font-size: 0.78rem; color: var(--muted); text-align: right; }

  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-head button { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 6px 14px; cursor: pointer; }
  .cal-filtros { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .cal-filtros .chip {
    padding: 6px 12px; border-radius: 20px; font-size: 0.78rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--card2); color: var(--muted);
  }
  .cal-filtros .chip.active { background: #3a2a1a; border-color: var(--orange); color: var(--orange); font-weight: 600; }
  .cal-filtros .chip.todos.active { background: #1e2a4a; border-color: var(--accent); color: var(--accent); }
  .cal-cell.dim { opacity: 0.18; }
  .filtro-count { font-size: 0.78rem; color: var(--orange); margin-top: 10px; }

  .ref-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .ref-row:last-child { border-bottom: none; }
  .ref-hora { width: 52px; flex-shrink: 0; color: var(--green); font-size: 0.75rem; font-weight: 700; padding-top: 2px; }
  .ref-nome { font-weight: 600; font-size: 0.85rem; }
  .ref-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; line-height: 1.45; }
  .dia-tag { display: inline-block; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 3px 10px; font-size: 0.72rem; color: var(--muted); margin-left: 8px; }
  .prep-item { font-size: 0.8rem; color: var(--muted); padding: 5px 0; line-height: 1.4; }
  .prep-item b { color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-wd { text-align: center; font-size: 0.62rem; color: var(--muted); padding: 4px 0; text-transform: uppercase; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 9px; background: var(--card2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 0.78rem; cursor: pointer; border: 1px solid transparent;
  }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.hoje { border-color: var(--accent); }
  .cal-cell.d-green { background: #16352a; color: var(--green); }
  .cal-cell.d-orange { background: #3a2a1a; color: var(--orange); }
  .cal-cell.d-red { background: #3a1f24; color: var(--red); }
  .cal-cell .ems { font-size: 0.55rem; line-height: 1; margin-top: 2px; min-height: 8px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; font-size: 0.7rem; color: var(--muted); }
  .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: -1px; }

  canvas { width: 100%; height: 220px; display: block; }
  .chart-note { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

  .btn {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 16px; cursor: pointer; font-size: 0.85rem;
    margin-right: 8px; margin-bottom: 8px;
  }
  .btn.primary { background: var(--green); border-color: var(--green); color: #0f1117; font-weight: 700; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: var(--card2); border-radius: 10px; padding: 12px; text-align: center; }
  .stat .num { font-size: 1.2rem; font-weight: 800; }
  .stat .lbl { font-size: 0.68rem; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header><h1>Dieta <span>Tracker</span> 🥗</h1></header>
  <div id="view"></div>
</div>
<nav>
  <button data-tab="hoje"><span class="ico">🍽️</span>Hoje</button>
  <button data-tab="plano"><span class="ico">📋</span>Plano</button>
  <button data-tab="mes"><span class="ico">📅</span>Mês</button>
  <button data-tab="peso"><span class="ico">📈</span>Peso</button>
  <button data-tab="dados"><span class="ico">⚙️</span>Dados</button>
</nav>

<script>
const KEY = 'dieta-tracker-v1';
const FASES = [
  { nome: 'Manutenção', ini: '2026-06-09', fim: '2026-11-08', kcal: '~2.500–2.700 kcal', prot: '160–170g proteína', livres: 2, meta: 'Peso estável (79–81 kg)', deficit: false },
  { nome: 'Polimento — leve déficit', ini: '2026-11-09', fim: '2026-12-20', kcal: '~2.200–2.400 kcal', prot: '170–180g proteína', livres: 1, meta: '−0,3 kg/semana', deficit: true },
  { nome: 'Pós-meta — manutenção', ini: '2026-12-21', fim: '2027-12-31', kcal: 'manutenção', prot: '160g+', livres: 2, meta: 'Manter o shape 🏖️', deficit: false },
];
const JUNK = [
  { id: 'pizza',  em: '🍕', lbl: 'Pizza / fast-food' },
  { id: 'alcool', em: '🍺', lbl: 'Álcool' },
  { id: 'doce',   em: '🍬', lbl: 'Doce / besteira' },
];
const WD = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const ATIVIDADE_DIA = { 1: 'Treino A 🏋️', 2: 'Corrida 5km 🏃', 3: 'Treino B 🏋️', 4: 'Descanso 😴', 5: 'Treino C 🏋️', 6: 'Descanso 😴', 0: 'Corrida 10km 🏃' };

function refeicoesDoDia(date) {
  const dow = date.getDay();
  const pol = faseDe(date).deficit;
  const treinoTarde = [1, 2, 3, 5].includes(dow);
  const r = [];
  r.push({ h: '7h30', n: 'Café da manhã', d: 'Crepioca (2 ovos + 2 col. sopa de tapioca) + 1 col. sopa de creme de ricota + café' + (dow === 0 ? ' — antes da corrida de 10km, como sempre' : '') });
  r.push({ h: '10h', n: 'Lanche da manhã 🍎', d: '1 fruta (banana, maçã ou uva) + 1 iogurte natural ou skyr' });
  if (dow === 0) r.push({ h: '12h30', n: 'Almoço', d: 'Livre social (se for o livre da semana — marca no app) ou regra do prato: ½ vegetais, ¼ proteína grelhada, ¼ carbo' });
  else if (dow === 6) r.push({ h: '12h', n: 'Almoço', d: 'Regra do prato: ½ vegetais, ¼ proteína grelhada, ¼ carbo (em casa ou fora)' });
  else r.push({ h: '12h', n: 'Almoço (PF)', d: '2 palmas de frango ou peixe grelhado + 4–5 col. sopa de arroz + 1 concha de feijão + metade do prato de salada/legumes com fio de azeite. Sem fritura, farofa e refri — bebida é água.' });
  if (treinoTarde) {
    r.push({ h: '16h30', n: 'Pré-treino ⚡', d: pol ? '1 banana (no polimento a aveia sai)' : '1 banana + 2 col. sopa de aveia (ou 1 pão de forma integral c/ 2 fatias de queijo). Não pula — é o que segura a energia no fim do treino.' });
    r.push({ h: '~19h', n: 'Pós-treino', d: 'Whey 1 dose + creatina 5g' });
  } else {
    r.push({ h: '16h30', n: 'Lanche da tarde', d: 'Cottage ou iogurte proteico + 1 fruta (ou 2 ovos cozidos do prep). Creatina 5g mesmo sem treino!' });
  }
  if (dow === 0) r.push({ h: 'tarde', n: 'Meal prep 🍳', d: 'Preparar as 5 marmitas da semana — checklist no card abaixo' });
  if (dow === 4) r.push({ h: '20h', n: 'Jantar 🍕', d: 'Quinta clássica da pizza: 3–4 fatias, sem refri açucarado — marca o 🍕 no app e segue o jogo. (Sem pizza hoje? Marmita normal.)' });
  else r.push({ h: '20h', n: 'Jantar (marmita)', d: pol ? '2 palmas de proteína + 1 punho de carbo (polimento) + metade do pote de legumes' : '2 palmas de proteína + 1,5 punho de carbo + metade do pote de legumes' });
  return r;
}

let state = load();
let tab = 'hoje';
let selDate = new Date();
let calRef = new Date();
let calFiltro = null;
let planDate = new Date();

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.dias) return s;
  } catch (e) {}
  return { dias: {} };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function k(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function pk(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function getDia(key) { return state.dias[key] || null; }
function setDia(key, patch) {
  state.dias[key] = Object.assign({}, state.dias[key] || {}, patch);
  save();
}
function hojeK() { return k(new Date()); }

function faseDe(d) {
  const key = k(d);
  for (const f of FASES) if (key >= f.ini && key <= f.fim) return f;
  return FASES[0];
}
function weekStart(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  return x;
}
function junkCount(dia) {
  if (!dia) return 0;
  return JUNK.reduce((n, j) => n + (dia[j.id] ? 1 : 0), 0);
}
function semanaStats(refDate) {
  const ini = weekStart(refDate);
  let livres = 0, frutas = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(ini); d.setDate(ini.getDate() + i);
    const dia = getDia(k(d));
    if (dia) { livres += junkCount(dia); if (dia.fruta) frutas++; }
  }
  return { livres, frutas };
}
function streakDias() {
  let n = 0;
  const d = new Date();
  const hoje = getDia(k(d));
  if (!hoje || hoje.segui !== true) d.setDate(d.getDate() - 1);
  while (true) {
    const dia = getDia(k(d));
    if (dia && dia.segui === true) { n++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return n;
}
function diasAte(keyStr) {
  const ms = pk(keyStr) - new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  return Math.max(0, Math.round(ms / 86400000));
}

// ---------- pesos ----------
function pesosOrdenados() {
  return Object.entries(state.dias)
    .filter(([, v]) => typeof v.peso === 'number' && v.peso > 0)
    .map(([key, v]) => ({ key, date: pk(key), peso: v.peso }))
    .sort((a, b) => a.date - b.date);
}
function mediaJanela(pesos, fimDate, dias) {
  const ini = new Date(fimDate); ini.setDate(ini.getDate() - dias + 1);
  const sel = pesos.filter(p => p.date >= ini && p.date <= fimDate);
  if (!sel.length) return null;
  return sel.reduce((s, p) => s + p.peso, 0) / sel.length;
}
function tendencia() {
  const pesos = pesosOrdenados();
  if (pesos.length < 4) return null;
  const hoje = new Date();
  const m1 = mediaJanela(pesos, hoje, 7);
  const fimAnt = new Date(hoje); fimAnt.setDate(hoje.getDate() - 7);
  const m0 = mediaJanela(pesos, fimAnt, 7);
  if (m1 == null || m0 == null) return null;
  return { atual: m1, delta: m1 - m0 };
}

// ---------- render ----------
function render() {
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const v = document.getElementById('view');
  if (tab === 'hoje') v.innerHTML = renderHoje();
  else if (tab === 'plano') v.innerHTML = renderPlano();
  else if (tab === 'mes') v.innerHTML = renderMes();
  else if (tab === 'peso') v.innerHTML = renderPeso();
  else v.innerHTML = renderDados();
  bind();
  if (tab === 'peso') { drawPesoChart(); drawLivresChart(); }
}

function faseBannerHtml() {
  const f = faseDe(new Date());
  const restam = diasAte(f.fim);
  const ateProa = diasAte('2026-12-20');
  return `<div class="fase-banner ${f.deficit ? 'deficit' : ''}">
    <b>${f.nome}</b> · ${f.kcal} · ${f.prot}
    <div class="meta">Meta: ${f.meta} · ${f.livres} livre(s)/semana · ${Math.ceil(restam/7)} sem. nesta fase · ${Math.ceil(ateProa/7)} sem. até a praia 🏖️</div>
  </div>`;
}

function renderHoje() {
  const key = k(selDate);
  const dia = getDia(key) || {};
  const f = faseDe(selDate);
  const st = semanaStats(selDate);
  const ehHoje = key === hojeK();
  const dtLbl = selDate.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  const trend = tendencia();
  const livreClass = st.livres > f.livres ? 'warn' : 'ok';

  return faseBannerHtml() + `
  <div class="streak-banner">
    <div class="streak-item"><div class="num flame">🔥 ${streakDias()}</div><div class="lbl">dias no plano</div></div>
    <div class="streak-item"><div class="num ${livreClass}">${st.livres}/${f.livres}</div><div class="lbl">livres na semana</div></div>
    <div class="streak-item"><div class="num ok">🍎 ${st.frutas}</div><div class="lbl">dias c/ fruta</div></div>
  </div>

  <div class="card">
    <div class="date-nav">
      <button id="d-prev">‹</button>
      <div class="dt">${dtLbl}${ehHoje ? '<span class="sub">hoje</span>' : '<span class="sub" id="d-hoje" style="color:var(--accent);cursor:pointer">voltar pra hoje</span>'}</div>
      <button id="d-next" ${ehHoje ? 'disabled style="opacity:.3"' : ''}>›</button>
    </div>

    <div class="toggle-row">
      <div class="toggle ${dia.segui === true ? 'on-green' : ''}" data-segui="true"><span class="em">✅</span>Segui o plano</div>
      <div class="toggle ${dia.segui === false ? 'on-red' : ''}" data-segui="false"><span class="em">😅</span>Furei</div>
    </div>
    <div class="hint">Refeição livre planejada (pizza de quinta etc.) conta como seguir o plano — marca ✅ e o item abaixo.</div>

    <div class="toggle-row">
      ${JUNK.map(j => `<div class="toggle ${dia[j.id] ? 'on-orange' : ''}" data-junk="${j.id}"><span class="em">${j.em}</span>${j.lbl}</div>`).join('')}
    </div>

    <div class="toggle-row">
      <div class="toggle ${dia.fruta ? 'on-green' : ''}" data-fruta="1" style="flex:1"><span class="em">🍎</span>Comi fruta</div>
    </div>
  </div>

  <div class="card">
    <h2>⚖️ Peso de hoje</h2>
    <div class="peso-row">
      <input type="number" step="0.1" min="50" max="120" id="peso-in" value="${dia.peso || ''}" placeholder="0.0">
      <span class="unit">kg</span>
      <div class="trend">${trend ? `média 7d: <b>${trend.atual.toFixed(1)}kg</b><br>${trend.delta >= 0 ? '+' : ''}${trend.delta.toFixed(2)}kg vs semana ant.` : 'registre pesos<br>pra ver a tendência'}</div>
    </div>
    <div class="hint" style="margin-top:8px">De manhã, depois do banheiro, antes do café. O que importa é a média semanal.</div>
  </div>`;
}

function renderPlano() {
  const dow = planDate.getDay();
  const f = faseDe(planDate);
  const ehHoje = k(planDate) === hojeK();
  const dtLbl = planDate.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  const refs = refeicoesDoDia(planDate);
  return faseBannerHtml() + `
  <div class="card">
    <div class="date-nav">
      <button id="p-prev">‹</button>
      <div class="dt">${dtLbl}<span class="sub">${ehHoje ? 'hoje · ' : ''}${ATIVIDADE_DIA[dow]}${ehHoje ? '' : ' · <span id="p-hoje" style="color:var(--accent);cursor:pointer">voltar pra hoje</span>'}</span></div>
      <button id="p-next">›</button>
    </div>
    ${refs.map(r => `<div class="ref-row"><div class="ref-hora">${r.h}</div><div><div class="ref-nome">${r.n}</div><div class="ref-desc">${r.d}</div></div></div>`).join('')}
  </div>

  <div class="card">
    <h2>📌 Regras de ouro</h2>
    <div class="prep-item"><b>Proteína em toda refeição</b> — 160g+/dia é o único número inegociável.</div>
    <div class="prep-item"><b>2 frutas por dia</b> — lanches de 10h e 16h30.</div>
    <div class="prep-item"><b>${f.livres} livre(s)/semana</b> nesta fase — pizza de quinta já gasta 1. Cerveja conta como livre (máx 1x/semana).</div>
    <div class="prep-item"><b>Água 2,5–3L/dia</b> — garrafa na mesa. Café liberado até 15h.</div>
    <div class="prep-item"><b>2 quadradinhos de chocolate 70%</b> após o almoço não contam como livre. Sobremesa inteira conta.</div>
    <div class="prep-item"><b>Estourou?</b> Marca no app sem culpa e o dia seguinte é normal — sem compensar.</div>
  </div>

  <div class="card">
    <h2>🍳 Meal prep de domingo (~1h30 · 5 marmitas)</h2>
    <div class="prep-item">1. <b>Forno (40min):</b> 2 assadeiras de legumes (brócolis, abobrinha, cenoura, cebola, batata) c/ azeite. Semana sim, semana não: assadeira de salmão/tilápia junto.</div>
    <div class="prep-item">2. <b>Grill:</b> 1,2kg de filé de frango temperado, em lotes.</div>
    <div class="prep-item">3. <b>Panela:</b> arroz da semana (ou as batatas do forno cobrem o carbo).</div>
    <div class="prep-item">4. <b>Ovos:</b> cozinhar 6–8 pros lanches.</div>
    <div class="prep-item">5. <b>Montar 5 marmitas:</b> 2 palmas proteína + 1,5 punho carbo + metade legumes. <b>2 na geladeira, 3 no freezer.</b></div>
    <div class="prep-item">6. Frutas lavadas e visíveis na fruteira.</div>
    <div class="prep-item" style="margin-top:6px">⚠️ <b>Acabou a marmita?</b> iFood com regra: prato grelhado + arroz + legumes. Marmitas do seu pai contam como prep.</div>
  </div>`;
}

function corDia(dia) {
  if (!dia || (dia.segui == null && !junkCount(dia) && !dia.fruta && !dia.peso)) return '';
  if (dia.segui === false) return 'd-red';
  if (junkCount(dia) > 0) return 'd-orange';
  if (dia.segui === true) return 'd-green';
  return '';
}

function renderMes() {
  const y = calRef.getFullYear(), m = calRef.getMonth();
  const prim = new Date(y, m, 1);
  const nDias = new Date(y, m + 1, 0).getDate();
  const off = (prim.getDay() + 6) % 7;
  let cells = WD.map(w => `<div class="cal-wd">${w}</div>`).join('');
  for (let i = 0; i < off; i++) cells += '<div class="cal-cell empty"></div>';
  let nMatch = 0;
  for (let d = 1; d <= nDias; d++) {
    const key = k(new Date(y, m, d));
    const dia = getDia(key);
    const match = !calFiltro || !!(dia && dia[calFiltro]);
    if (calFiltro && match) nMatch++;
    const ems = dia ? JUNK.filter(j => dia[j.id] && (!calFiltro || j.id === calFiltro)).map(j => j.em).join('') : '';
    cells += `<div class="cal-cell ${corDia(dia)} ${key === hojeK() ? 'hoje' : ''} ${match ? '' : 'dim'}" data-day="${key}">
      <span>${d}</span><span class="ems">${ems}</span>
    </div>`;
  }
  const fj = calFiltro ? JUNK.find(j => j.id === calFiltro) : null;
  return faseBannerHtml() + `
  <div class="card">
    <div class="cal-head">
      <button id="m-prev">‹</button>
      <h2 style="margin:0">${MESES[m]} ${y}</h2>
      <button id="m-next">›</button>
    </div>
    <div class="cal-filtros">
      <button class="chip todos ${!calFiltro ? 'active' : ''}" data-filtro="">Todos</button>
      ${JUNK.map(j => `<button class="chip ${calFiltro === j.id ? 'active' : ''}" data-filtro="${j.id}">${j.em} ${j.lbl}</button>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    ${fj ? `<div class="filtro-count">${fj.em} ${nMatch} dia(s) com ${fj.lbl.toLowerCase()} em ${MESES[m].toLowerCase()}</div>` : ''}
    <div class="legend">
      <span><span class="sw" style="background:#16352a"></span>No plano</span>
      <span><span class="sw" style="background:#3a2a1a"></span>Com livre (🍕🍺🍬)</span>
      <span><span class="sw" style="background:#3a1f24"></span>Furei</span>
      <span><span class="sw" style="background:var(--card2)"></span>Sem registro</span>
    </div>
    <div class="hint" style="margin-top:8px">Toca num dia pra editar.</div>
  </div>`;
}

function renderPeso() {
  const trend = tendencia();
  const f = faseDe(new Date());
  return faseBannerHtml() + `
  <div class="card">
    <h2>⚖️ Evolução do peso</h2>
    <canvas id="ch-peso"></canvas>
    <div class="chart-note">Pontos = pesagens · linha verde = média móvel 7 dias. ${trend ? `Tendência: <b style="color:var(--text)">${trend.delta >= 0 ? '+' : ''}${trend.delta.toFixed(2)} kg/semana</b> (meta: ${f.meta.toLowerCase()})` : ''}</div>
  </div>
  <div class="card">
    <h2>🍕 Livres por semana</h2>
    <canvas id="ch-livres" style="height:180px"></canvas>
    <div class="chart-note">Linha tracejada = orçamento da fase (${f.livres}/semana).</div>
  </div>`;
}

function renderDados() {
  const entradas = Object.entries(state.dias);
  const total = entradas.filter(([, v]) => v.segui != null || junkCount(v) || v.fruta || v.peso).length;
  const seguiu = entradas.filter(([, v]) => v.segui === true).length;
  const livres = entradas.reduce((s, [, v]) => s + junkCount(v), 0);
  const pesos = pesosOrdenados();
  return faseBannerHtml() + `
  <div class="card">
    <h2>📊 Resumo geral</h2>
    <div class="stat-grid">
      <div class="stat"><div class="num">${total}</div><div class="lbl">dias registrados</div></div>
      <div class="stat"><div class="num ok">${total ? Math.round(100 * seguiu / total) : 0}%</div><div class="lbl">dias no plano</div></div>
      <div class="stat"><div class="num" style="color:var(--orange)">${livres}</div><div class="lbl">livres no total</div></div>
      <div class="stat"><div class="num">${pesos.length ? pesos[pesos.length-1].peso.toFixed(1) : '—'}</div><div class="lbl">último peso (kg)</div></div>
    </div>
  </div>
  <div class="card">
    <h2>💾 Backup</h2>
    <button class="btn primary" id="btn-export">Exportar JSON</button>
    <button class="btn" id="btn-import">Importar JSON</button>
    <input type="file" id="file-import" accept=".json" style="display:none">
    <div class="hint" style="margin-top:8px">Os dados ficam só neste dispositivo (localStorage). Exporta de vez em quando.</div>
  </div>`;
}

// ---------- charts ----------
function setupCanvas(c) {
  const dpr = window.devicePixelRatio || 1;
  const w = c.clientWidth, h = c.clientHeight;
  c.width = w * dpr; c.height = h * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w, h };
}

function drawPesoChart() {
  const c = document.getElementById('ch-peso');
  if (!c) return;
  const { ctx, w, h } = setupCanvas(c);
  const pesos = pesosOrdenados();
  if (pesos.length < 2) {
    ctx.fillStyle = '#8b90a0'; ctx.font = '13px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('Registre pelo menos 2 pesagens pra ver o gráfico', w / 2, h / 2);
    return;
  }
  const pad = { l: 38, r: 10, t: 12, b: 22 };
  const t0 = pesos[0].date.getTime(), t1 = pesos[pesos.length - 1].date.getTime();
  const vals = pesos.map(p => p.peso);
  let yMin = Math.min(...vals) - 0.5, yMax = Math.max(...vals) + 0.5;
  const X = t => pad.l + (t1 === t0 ? 0 : (t - t0) / (t1 - t0)) * (w - pad.l - pad.r);
  const Y = v => pad.t + (1 - (v - yMin) / (yMax - yMin)) * (h - pad.t - pad.b);

  ctx.strokeStyle = '#2b2f3e'; ctx.fillStyle = '#8b90a0'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'right';
  const passos = 4;
  for (let i = 0; i <= passos; i++) {
    const v = yMin + (i / passos) * (yMax - yMin);
    const y = Y(v);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillText(v.toFixed(1), pad.l - 4, y + 3);
  }
  ctx.textAlign = 'center';
  ctx.fillText(pesos[0].date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), pad.l + 14, h - 6);
  ctx.fillText(pesos[pesos.length - 1].date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), w - pad.r - 16, h - 6);

  // pesagens brutas
  ctx.strokeStyle = '#4f8ef766'; ctx.beginPath();
  pesos.forEach((p, i) => { const x = X(p.date.getTime()), y = Y(p.peso); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
  ctx.stroke();
  ctx.fillStyle = '#4f8ef7';
  pesos.forEach(p => { ctx.beginPath(); ctx.arc(X(p.date.getTime()), Y(p.peso), 2.5, 0, 7); ctx.fill(); });

  // média móvel 7d
  ctx.strokeStyle = '#3ecf8e'; ctx.lineWidth = 2; ctx.beginPath();
  pesos.forEach((p, i) => {
    const m = mediaJanela(pesos, p.date, 7);
    const x = X(p.date.getTime()), y = Y(m);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  ctx.stroke(); ctx.lineWidth = 1;
}

function drawLivresChart() {
  const c = document.getElementById('ch-livres');
  if (!c) return;
  const { ctx, w, h } = setupCanvas(c);
  const nSem = 8;
  const semanas = [];
  const wsAtual = weekStart(new Date());
  for (let i = nSem - 1; i >= 0; i--) {
    const ini = new Date(wsAtual); ini.setDate(wsAtual.getDate() - i * 7);
    const st = semanaStats(ini);
    semanas.push({ ini, livres: st.livres, budget: faseDe(ini).livres });
  }
  const pad = { l: 24, r: 10, t: 12, b: 22 };
  const maxV = Math.max(3, ...semanas.map(s => s.livres));
  const bw = (w - pad.l - pad.r) / nSem;
  const Y = v => pad.t + (1 - v / maxV) * (h - pad.t - pad.b);

  ctx.font = '10px Segoe UI';
  semanas.forEach((s, i) => {
    const x = pad.l + i * bw + bw * 0.18;
    const dentro = s.livres <= s.budget;
    ctx.fillStyle = s.livres === 0 ? '#2b2f3e' : (dentro ? '#3ecf8e' : '#ff6b6b');
    const y = Y(s.livres);
    ctx.fillRect(x, y, bw * 0.64, h - pad.b - y);
    ctx.fillStyle = '#8b90a0'; ctx.textAlign = 'center';
    ctx.fillText(s.ini.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), x + bw * 0.32, h - 6);
    if (s.livres > 0) { ctx.fillStyle = '#e8eaf0'; ctx.fillText(s.livres, x + bw * 0.32, y - 4); }
    // linha do orçamento
    ctx.strokeStyle = '#ff9f43'; ctx.setLineDash([3, 3]); ctx.beginPath();
    ctx.moveTo(pad.l + i * bw, Y(s.budget)); ctx.lineTo(pad.l + (i + 1) * bw, Y(s.budget));
    ctx.stroke(); ctx.setLineDash([]);
  });
}

// ---------- eventos ----------
function bind() {
  document.querySelectorAll('[data-segui]').forEach(el => el.onclick = () => {
    const val = el.dataset.segui === 'true';
    const key = k(selDate);
    const atual = (getDia(key) || {}).segui;
    setDia(key, { segui: atual === val ? null : val });
    render();
  });
  document.querySelectorAll('[data-junk]').forEach(el => el.onclick = () => {
    const key = k(selDate);
    const dia = getDia(key) || {};
    setDia(key, { [el.dataset.junk]: !dia[el.dataset.junk] });
    render();
  });
  document.querySelectorAll('[data-fruta]').forEach(el => el.onclick = () => {
    const key = k(selDate);
    const dia = getDia(key) || {};
    setDia(key, { fruta: !dia.fruta });
    render();
  });
  const pin = document.getElementById('peso-in');
  if (pin) pin.onchange = () => {
    const v = parseFloat(pin.value);
    setDia(k(selDate), { peso: isNaN(v) ? null : v });
    render();
  };
  const dp = document.getElementById('d-prev');
  if (dp) dp.onclick = () => { selDate.setDate(selDate.getDate() - 1); render(); };
  const dn = document.getElementById('d-next');
  if (dn) dn.onclick = () => {
    if (k(selDate) !== hojeK()) { selDate.setDate(selDate.getDate() + 1); render(); }
  };
  const dh = document.getElementById('d-hoje');
  if (dh) dh.onclick = () => { selDate = new Date(); render(); };
  document.querySelectorAll('[data-filtro]').forEach(el => el.onclick = () => {
    calFiltro = el.dataset.filtro || null;
    render();
  });
  const pp = document.getElementById('p-prev');
  if (pp) pp.onclick = () => { planDate.setDate(planDate.getDate() - 1); render(); };
  const pn = document.getElementById('p-next');
  if (pn) pn.onclick = () => { planDate.setDate(planDate.getDate() + 1); render(); };
  const ph = document.getElementById('p-hoje');
  if (ph) ph.onclick = () => { planDate = new Date(); render(); };
  const mp = document.getElementById('m-prev');
  if (mp) mp.onclick = () => { calRef.setMonth(calRef.getMonth() - 1); render(); };
  const mn = document.getElementById('m-next');
  if (mn) mn.onclick = () => { calRef.setMonth(calRef.getMonth() + 1); render(); };
  document.querySelectorAll('[data-day]').forEach(el => el.onclick = () => {
    selDate = pk(el.dataset.day);
    if (selDate > new Date()) return;
    tab = 'hoje'; render();
  });
  const be = document.getElementById('btn-export');
  if (be) be.onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dieta-tracker-' + hojeK() + '.json';
    a.click();
  };
  const bi = document.getElementById('btn-import');
  const fi = document.getElementById('file-import');
  if (bi && fi) {
    bi.onclick = () => fi.click();
    fi.onchange = () => {
      const f = fi.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const s = JSON.parse(r.result);
          if (!s.dias) throw new Error('formato inválido');
          if (confirm('Substituir os dados atuais pelos do arquivo?')) { state = s; save(); render(); }
        } catch (e) { alert('Arquivo inválido: ' + e.message); }
      };
      r.readAsText(f);
    };
  }
}

document.querySelectorAll('nav button').forEach(b => b.onclick = () => { tab = b.dataset.tab; render(); });
render();

// PWA: service worker para funcionar offline
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js");
}
</script>
